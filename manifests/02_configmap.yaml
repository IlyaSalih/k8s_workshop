apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: workshop
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  DB_HOST: "postgres-service"   
  DB_PORT: "5432"
  DB_NAME: "workshop_db"
  nginx.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }